<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500">
  <defs>
    <linearGradient id="nodeGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11998e"/>
      <stop offset="100%" style="stop-color:#38ef7d"/>
    </linearGradient>
    <linearGradient id="nodeGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eb3349"/>
      <stop offset="100%" style="stop-color:#f45c43"/>
    </linearGradient>
    <linearGradient id="nodeGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4776E6"/>
      <stop offset="100%" style="stop-color:#8E54E9"/>
    </linearGradient>
    <linearGradient id="nodeGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F2994A"/>
      <stop offset="100%" style="stop-color:#F2C94C"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <filter id="nodeShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="500" fill="#0f172a"/>
  
  <!-- Grid pattern -->
  <g opacity="0.1">
    <defs>
      <pattern id="grid2" width="30" height="30" patternUnits="userSpaceOnUse">
        <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#fff" stroke-width="1"/>
      </pattern>
    </defs>
    <rect width="900" height="500" fill="url(#grid2)"/>
  </g>
  
  <!-- Title -->
  <text x="450" y="40" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="bold" fill="#f1f5f9" text-anchor="middle">
    Multi-Step Research Workflow
  </text>
  
  <!-- Node 1: Research -->
  <g transform="translate(380, 80)" filter="url(#nodeShadow)">
    <rect x="0" y="0" width="140" height="80" rx="12" fill="url(#nodeGrad1)"/>
    <text x="70" y="28" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">
      🔍 Research
    </text>
    <text x="70" y="48" font-family="'Consolas', monospace" font-size="10" fill="#ffffff" text-anchor="middle">
      OpenAI GPT-4
    </text>
    <text x="70" y="64" font-family="'Consolas', monospace" font-size="9" fill="#ffffff" text-anchor="middle" opacity="0.8">
      temp: 0.5
    </text>
    <!-- Output handle -->
    <circle cx="70" cy="80" r="6" fill="#1e293b" stroke="#38ef7d" stroke-width="2"/>
  </g>
  
  <!-- Arrow to Outline -->
  <path d="M 450 160 L 450 190" stroke="#475569" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Node 2: Outline -->
  <g transform="translate(380, 190)" filter="url(#nodeShadow)">
    <rect x="0" y="0" width="140" height="80" rx="12" fill="url(#nodeGrad2)"/>
    <text x="70" y="28" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">
      📋 Outline
    </text>
    <text x="70" y="48" font-family="'Consolas', monospace" font-size="10" fill="#ffffff" text-anchor="middle">
      Anthropic Claude
    </text>
    <text x="70" y="64" font-family="'Consolas', monospace" font-size="9" fill="#ffffff" text-anchor="middle" opacity="0.8">
      temp: 0.4
    </text>
    <!-- Input handle -->
    <circle cx="70" cy="0" r="6" fill="#1e293b" stroke="#f45c43" stroke-width="2"/>
    <!-- Output handle -->
    <circle cx="70" cy="80" r="6" fill="#1e293b" stroke="#f45c43" stroke-width="2"/>
  </g>
  
  <!-- Arrow to Draft -->
  <path d="M 450 270 L 450 300" stroke="#475569" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Node 3: Draft -->
  <g transform="translate(380, 300)" filter="url(#nodeShadow)">
    <rect x="0" y="0" width="140" height="80" rx="12" fill="url(#nodeGrad3)"/>
    <text x="70" y="28" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">
      ✍️ Draft
    </text>
    <text x="70" y="48" font-family="'Consolas', monospace" font-size="10" fill="#ffffff" text-anchor="middle">
      OpenAI GPT-4
    </text>
    <text x="70" y="64" font-family="'Consolas', monospace" font-size="9" fill="#ffffff" text-anchor="middle" opacity="0.8">
      temp: 0.7
    </text>
    <!-- Input handle -->
    <circle cx="70" cy="0" r="6" fill="#1e293b" stroke="#8E54E9" stroke-width="2"/>
    <!-- Output handle -->
    <circle cx="70" cy="80" r="6" fill="#1e293b" stroke="#8E54E9" stroke-width="2"/>
  </g>
  
  <!-- Arrow to Review -->
  <path d="M 450 380 L 450 410" stroke="#475569" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Node 4: Review -->
  <g transform="translate(380, 410)" filter="url(#nodeShadow)">
    <rect x="0" y="0" width="140" height="80" rx="12" fill="url(#nodeGrad4)"/>
    <text x="70" y="28" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">
      ✅ Review
    </text>
    <text x="70" y="48" font-family="'Consolas', monospace" font-size="10" fill="#ffffff" text-anchor="middle">
      Anthropic Claude
    </text>
    <text x="70" y="64" font-family="'Consolas', monospace" font-size="9" fill="#ffffff" text-anchor="middle" opacity="0.8">
      temp: 0.3
    </text>
    <!-- Input handle -->
    <circle cx="70" cy="0" r="6" fill="#1e293b" stroke="#F2C94C" stroke-width="2"/>
  </g>
  
  <!-- Variable annotations -->
  <g transform="translate(50, 120)">
    <rect x="0" y="0" width="280" height="60" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="15" y="25" font-family="'Consolas', monospace" font-size="11" fill="#94a3b8">
      Variables:
    </text>
    <text x="15" y="45" font-family="'Consolas', monospace" font-size="11" fill="#a5d6ff">
      topic: "Quantum Computing"
    </text>
    <text x="150" y="45" font-family="'Consolas', monospace" font-size="11" fill="#a5d6ff">
      audience: "technical"
    </text>
  </g>
  
  <!-- Execution flow indicator -->
  <g transform="translate(570, 120)">
    <rect x="0" y="0" width="280" height="60" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="15" y="25" font-family="'Consolas', monospace" font-size="11" fill="#94a3b8">
      Execution:
    </text>
    <text x="15" y="45" font-family="'Consolas', monospace" font-size="11" fill="#4ade80">
      ✓ Sequential (DAG)
    </text>
    <text x="120" y="45" font-family="'Consolas', monospace" font-size="11" fill="#fbbf24">
      ⚡ Cached
    </text>
    <text x="190" y="45" font-family="'Consolas', monospace" font-size="11" fill="#60a5fa">
      ↻ Retry
    </text>
  </g>
  
  <!-- Prompt preview -->
  <g transform="translate(50, 200)">
    <rect x="0" y="0" width="280" height="120" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="15" y="25" font-family="'Consolas', monospace" font-size="11" fill="#94a3b8">
      Prompt Template:
    </text>
    <text x="15" y="45" font-family="'Consolas', monospace" font-size="10" fill="#4ade80">
      Research the following topic:
    </text>
    <text x="15" y="65" font-family="'Consolas', monospace" font-size="10" fill="#f472b6">
      {{topic}}
    </text>
    <text x="15" y="85" font-family="'Consolas', monospace" font-size="10" fill="#4ade80">
      
      Provide key points, trends,
    </text>
    <text x="15" y="100" font-family="'Consolas', monospace" font-size="10" fill="#4ade80">
      and considerations for {{audience}}
    </text>
  </g>
  
  <!-- Output preview -->
  <g transform="translate(570, 200)">
    <rect x="0" y="0" width="280" height="120" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="15" y="25" font-family="'Consolas', monospace" font-size="11" fill="#94a3b8">
      Output (cached):
    </text>
    <text x="15" y="45" font-family="'Consolas', monospace" font-size="9" fill="#a5d6ff">
      # Quantum Computing Overview
    </text>
    <text x="15" y="60" font-family="'Consolas', monospace" font-size="9" fill="#94a3b8">
      ## Key Concepts
    </text>
    <text x="15" y="75" font-family="'Consolas', monospace" font-size="9" fill="#94a3b8">
      - Superposition
    </text>
    <text x="15" y="90" font-family="'Consolas', monospace" font-size="9" fill="#94a3b8">
      - Entanglement
    </text>
    <text x="15" y="105" font-family="'Consolas', monospace" font-size="9" fill="#94a3b8">
      - Quantum Gates...
    </text>
  </g>
  
  <!-- Legend -->
  <g transform="translate(50, 340)">
    <text x="0" y="0" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#f1f5f9">
      Legend:
    </text>
    <circle cx="60" cy="-6" r="8" fill="url(#nodeGrad1)"/>
    <text x="75" y="0" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#94a3b8">OpenAI</text>
    <circle cx="140" cy="-6" r="8" fill="url(#nodeGrad2)"/>
    <text x="155" y="0" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#94a3b8">Anthropic</text>
  </g>
</svg>
