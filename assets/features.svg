<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="400" viewBox="0 0 1000 400">
  <defs>
    <linearGradient id="featGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="featGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="featGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="featGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <linearGradient id="featGrad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a"/>
      <stop offset="100%" style="stop-color:#fee140"/>
    </linearGradient>
    <linearGradient id="featGrad6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#30cfd0"/>
      <stop offset="100%" style="stop-color:#330867"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-opacity="0.12"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="400" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="500" y="50" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="bold" fill="#1e293b" text-anchor="middle">
    ✨ Powerful Features
  </text>
  
  <!-- Feature Cards Row 1 -->
  <g transform="translate(50, 90)">
    <!-- Card 1: Multi-Provider -->
    <g filter="url(#cardShadow)">
      <rect x="0" y="0" width="280" height="130" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
      <rect x="0" y="0" width="280" height="6" rx="3" fill="url(#featGrad1)"/>
    </g>
    <text x="140" y="40" font-family="'Segoe UI', Arial, sans-serif" font-size="24" text-anchor="middle">🔌</text>
    <text x="140" y="70" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e293b" text-anchor="middle">
      Multi-Provider
    </text>
    <text x="140" y="92" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">
      OpenAI, Anthropic, Azure, Ollama
    </text>
    <text x="140" y="112" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">
      Unified API for all LLM providers
    </text>
    
    <!-- Card 2: Visual Editor -->
    <g transform="translate(300, 0)" filter="url(#cardShadow)">
      <rect x="0" y="0" width="280" height="130" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
      <rect x="0" y="0" width="280" height="6" rx="3" fill="url(#featGrad2)"/>
    </g>
    <g transform="translate(440, 40)">
      <text x="0" y="0" font-family="'Segoe UI', Arial, sans-serif" font-size="24" text-anchor="middle">🎨</text>
    </g>
    <g transform="translate(440, 70)">
      <text x="0" y="0" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e293b" text-anchor="middle">
        Visual Editor
      </text>
    </g>
    <g transform="translate(440, 92)">
      <text x="0" y="0" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">
        Drag &amp; Drop Interface
      </text>
    </g>
    <g transform="translate(440, 112)">
      <text x="0" y="0" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">
        Build workflows visually with React Flow
      </text>
    </g>
    
    <!-- Card 3: Caching -->
    <g transform="translate(600, 0)" filter="url(#cardShadow)">
      <rect x="0" y="0" width="280" height="130" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
      <rect x="0" y="0" width="280" height="6" rx="3" fill="url(#featGrad3)"/>
    </g>
    <text x="780" y="40" font-family="'Segoe UI', Arial, sans-serif" font-size="24" text-anchor="middle">💾</text>
    <text x="780" y="70" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e293b" text-anchor="middle">
      Intelligent Caching
    </text>
    <text x="780" y="92" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">
      Reduce API Costs by 70%
    </text>
    <text x="780" y="112" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">
      Automatic result caching with TTL
    </text>
  </g>
  
  <!-- Feature Cards Row 2 -->
  <g transform="translate(50, 240)">
    <!-- Card 4: Retry Logic -->
    <g filter="url(#cardShadow)">
      <rect x="0" y="0" width="280" height="130" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
      <rect x="0" y="0" width="280" height="6" rx="3" fill="url(#featGrad4)"/>
    </g>
    <text x="140" y="40" font-family="'Segoe UI', Arial, sans-serif" font-size="24" text-anchor="middle">🔁</text>
    <text x="140" y="70" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e293b" text-anchor="middle">
      Auto-Retry
    </text>
    <text x="140" y="92" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">
      Exponential Backoff
    </text>
    <text x="140" y="112" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">
      Handle rate limits &amp; failures gracefully
    </text>
    
    <!-- Card 5: Validation -->
    <g transform="translate(300, 0)" filter="url(#cardShadow)">
      <rect x="0" y="0" width="280" height="130" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
      <rect x="0" y="0" width="280" height="6" rx="3" fill="url(#featGrad5)"/>
    </g>
    <text x="440" y="40" font-family="'Segoe UI', Arial, sans-serif" font-size="24" text-anchor="middle">✅</text>
    <text x="440" y="70" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e293b" text-anchor="middle">
      Workflow Validation
    </text>
    <text x="440" y="92" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">
      DAG Cycle Detection
    </text>
    <text x="440" y="112" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">
      Catch errors before execution
    </text>
    
    <!-- Card 6: Export -->
    <g transform="translate(600, 0)" filter="url(#cardShadow)">
      <rect x="0" y="0" width="280" height="130" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
      <rect x="0" y="0" width="280" height="6" rx="3" fill="url(#featGrad6)"/>
    </g>
    <text x="780" y="40" font-family="'Segoe UI', Arial, sans-serif" font-size="24" text-anchor="middle">📤</text>
    <text x="780" y="70" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="bold" fill="#1e293b" text-anchor="middle">
      Multiple Exports
    </text>
    <text x="780" y="92" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">
      JSON, YAML, Mermaid, Code
    </text>
    <text x="780" y="112" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">
      Export to your preferred format
    </text>
  </g>
  
  <!-- Stats bar at bottom -->
  <g transform="translate(50, 370)">
    <rect x="0" y="0" width="900" height="24" rx="12" fill="#e2e8f0"/>
    <text x="150" y="17" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#475569" text-anchor="middle">
      ⚡ 10x Faster Development
    </text>
    <text x="350" y="17" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#475569" text-anchor="middle">
      📦 3 Packages
    </text>
    <text x="500" y="17" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#475569" text-anchor="middle">
      🧪 80%+ Test Coverage
    </text>
    <text x="700" y="17" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#475569" text-anchor="middle">
      📚 5 Example Workflows
    </text>
  </g>
</svg>
