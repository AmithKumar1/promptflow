<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="600" viewBox="0 0 1000 600">
  <defs>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="cliGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="uiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="providerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b"/>
      <stop offset="100%" style="stop-color:#38f9d7"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="600" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="500" y="40" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="bold" fill="#1e293b" text-anchor="middle">
    PromptFlow Architecture
  </text>
  
  <!-- User Layer -->
  <g transform="translate(50, 70)">
    <rect x="0" y="0" width="900" height="60" rx="8" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1"/>
    <text x="450" y="25" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="600" fill="#475569" text-anchor="middle">
      👤 User / Developer
    </text>
    <text x="450" y="45" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">
      CLI Commands • Visual Editor • Programmatic API
    </text>
  </g>
  
  <!-- Arrow down -->
  <path d="M 500 140 L 500 160" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Main Packages Row -->
  <g transform="translate(50, 170)">
    <!-- CLI Package -->
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="280" height="140" rx="12" fill="url(#cliGrad)"/>
    </g>
    <text x="140" y="35" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">
      📦 CLI
    </text>
    <text x="140" y="60" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" opacity="0.9">
      @promptflow/cli
    </text>
    <g transform="translate(20, 80)">
      <text x="0" y="0" font-family="'Consolas', monospace" font-size="11" fill="#ffffff">• init command</text>
      <text x="0" y="18" font-family="'Consolas', monospace" font-size="11" fill="#ffffff">• run/execute</text>
      <text x="0" y="36" font-family="'Consolas', monospace" font-size="11" fill="#ffffff">• validate</text>
      <text x="0" y="54" font-family="'Consolas', monospace" font-size="11" fill="#ffffff">• export (JSON/YAML/Mermaid)</text>
    </g>
    
    <!-- Core Package -->
    <g transform="translate(320, 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="360" height="140" rx="12" fill="url(#coreGrad)"/>
    </g>
    <g transform="translate(500, 205)">
      <text x="0" y="0" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">
        ⚙️ Core Engine
      </text>
      <text x="0" y="25" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" opacity="0.9">
        @promptflow/core
      </text>
      <g transform="translate(-160, 50)">
        <text x="0" y="0" font-family="'Consolas', monospace" font-size="11" fill="#ffffff">• Workflow Executor</text>
        <text x="0" y="18" font-family="'Consolas', monospace" font-size="11" fill="#ffffff">• DAG Validator</text>
        <text x="0" y="36" font-family="'Consolas', monospace" font-size="11" fill="#ffffff">• Provider Registry</text>
        <text x="0" y="54" font-family="'Consolas', monospace" font-size="11" fill="#ffffff">• Caching System</text>
        <text x="0" y="72" font-family="'Consolas', monospace" font-size="11" fill="#ffffff">• Retry Logic</text>
      </g>
    </g>
    
    <!-- UI Package -->
    <g transform="translate(720, 0)" filter="url(#shadow)">
      <rect x="0" y="0" width="280" height="140" rx="12" fill="url(#uiGrad)"/>
    </g>
    <g transform="translate(860, 205)">
      <text x="0" y="0" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">
        🎨 Visual Editor
      </text>
      <text x="0" y="25" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" opacity="0.9">
        @promptflow/ui
      </text>
      <g transform="translate(-140, 50)">
        <text x="0" y="0" font-family="'Consolas', monospace" font-size="11" fill="#ffffff">• React Flow Canvas</text>
        <text x="0" y="18" font-family="'Consolas', monospace" font-size="11" fill="#ffffff">• Node Editor</text>
        <text x="0" y="36" font-family="'Consolas', monospace" font-size="11" fill="#ffffff">• Property Panel</text>
        <text x="0" y="54" font-family="'Consolas', monospace" font-size="11" fill="#ffffff">• Import/Export</text>
      </g>
    </g>
  </g>
  
  <!-- Arrow down -->
  <path d="M 500 320 L 500 340" stroke="#94a3b8" stroke-width="2"/>
  
  <!-- Providers Layer -->
  <g transform="translate(50, 350)">
    <rect x="0" y="0" width="900" height="180" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="2"/>
    <text x="450" y="35" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="bold" fill="#334155" text-anchor="middle">
      🔌 LLM Providers
    </text>
    
    <!-- Provider boxes -->
    <g transform="translate(100, 60)">
      <!-- OpenAI -->
      <rect x="0" y="0" width="160" height="90" rx="8" fill="#ffffff" stroke="#10a37f" stroke-width="2"/>
      <text x="80" y="30" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="bold" fill="#10a37f" text-anchor="middle">
        OpenAI
      </text>
      <text x="80" y="50" font-family="'Consolas', monospace" font-size="11" fill="#64748b" text-anchor="middle">
        GPT-4 Turbo
      </text>
      <text x="80" y="68" font-family="'Consolas', monospace" font-size="11" fill="#64748b" text-anchor="middle">
        GPT-3.5
      </text>
    </g>
    
    <g transform="translate(290, 60)">
      <!-- Anthropic -->
      <rect x="0" y="0" width="160" height="90" rx="8" fill="#ffffff" stroke="#d97757" stroke-width="2"/>
      <text x="80" y="30" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="bold" fill="#d97757" text-anchor="middle">
        Anthropic
      </text>
      <text x="80" y="50" font-family="'Consolas', monospace" font-size="11" fill="#64748b" text-anchor="middle">
        Claude 3 Sonnet
      </text>
      <text x="80" y="68" font-family="'Consolas', monospace" font-size="11" fill="#64748b" text-anchor="middle">
        Claude 3 Opus
      </text>
    </g>
    
    <g transform="translate(480, 60)">
      <!-- Azure -->
      <rect x="0" y="0" width="160" height="90" rx="8" fill="#ffffff" stroke="#0078d4" stroke-width="2"/>
      <text x="80" y="30" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="bold" fill="#0078d4" text-anchor="middle">
        Azure OpenAI
      </text>
      <text x="80" y="50" font-family="'Consolas', monospace" font-size="11" fill="#64748b" text-anchor="middle">
        Enterprise
      </text>
      <text x="80" y="68" font-family="'Consolas', monospace" font-size="11" fill="#64748b" text-anchor="middle">
        VPC Support
      </text>
    </g>
    
    <g transform="translate(670, 60)">
      <!-- Ollama -->
      <rect x="0" y="0" width="160" height="90" rx="8" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
      <text x="80" y="30" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="bold" fill="#7c3aed" text-anchor="middle">
        Ollama
      </text>
      <text x="80" y="50" font-family="'Consolas', monospace" font-size="11" fill="#64748b" text-anchor="middle">
        Local Models
      </text>
      <text x="80" y="68" font-family="'Consolas', monospace" font-size="11" fill="#64748b" text-anchor="middle">
        Self-hosted
      </text>
    </g>
    
    <!-- Connection lines to core -->
    <path d="M 180 60 L 500 310" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4"/>
    <path d="M 370 60 L 500 310" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4"/>
    <path d="M 560 60 L 500 310" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4"/>
    <path d="M 750 60 L 500 310" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4"/>
  </g>
  
  <!-- Workflow example -->
  <g transform="translate(50, 550)">
    <text x="0" y="0" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="#64748b">
      Example Workflow:
    </text>
    <text x="120" y="0" font-family="'Consolas', monospace" font-size="11" fill="#059669">
      research → outline → draft → review
    </text>
  </g>
</svg>
